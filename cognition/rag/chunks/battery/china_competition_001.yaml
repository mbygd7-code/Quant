id: china_competition_001
topic: "중국 셀(CATL, BYD) 경쟁 강화 → 한국 셀 마진 압박"
markets: [CN, KR]
sectors: [battery]
related_tickers: ["373220", "006400", "393890"]
trigger_conditions:
  - "CATL/BYD 분기 실적·점유율 발표"
  - "유럽 자동차 OEM의 중국 셀 도입 보도"
  - "중국 LFP 셀 가격 인하 기사"
positive_signal: "주의"
risk_warning: "본 청크는 부정 신호 — 발견 시 한국 셀 종목 약세 압력. 위험 조기 인지 목적"
body: |
  중국 CATL·BYD는 LFP 셀 가격 경쟁력으로 유럽·동남아 시장에서 한국 셀
  점유율을 잠식 중이다. 분기 실적에서 점유율 확대 + 가격 인하 코멘트가
  동시에 나오면 LG에너지솔루션·삼성SDI에 마진 압박 신호. 더블유씨피(분리막)는
  중국 분리막 업체와의 경쟁이 직접적이라 점유율 변동에 더 민감하다. 단,
  지정학적 분리(US/EU의 중국 견제) 흐름이 강화되면 역으로 한국에 기회가
  될 수도 있다.
historical_examples:
  - "2024-11-20: BYD 유럽 신규 공장 발표 → LG에너지솔루션 -2.8%"
  - "2025-03-25: 중국 LFP 가격 -15% → 삼성SDI -3.2%, 더블유씨피 -5.1%"
