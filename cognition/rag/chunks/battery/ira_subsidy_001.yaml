id: ira_subsidy_001
topic: "美 IRA EV 보조금·정책 변동 → 한국 셀 수출 영향"
markets: [US, KR]
sectors: [battery]
related_tickers: ["373220", "006400", "096770"]
trigger_conditions:
  - "美 의회 IRA EV 세액공제 변경 발의"
  - "美 재무부 FEOC(우려 외국 단체) 가이드라인 발표"
  - "中 배터리 광물 비중 관련 행정명령"
positive_signal: "관심"
risk_warning: "정책 리스크는 양면. 보조금 강화는 한국 셀에 호재이지만, FEOC 강화 시 중국산 양극재 의존 한국 업체에 부담"
body: |
  美 인플레이션 감축법(IRA)의 EV 세액공제(차량당 $7,500)는 북미산 셀 사용을
  요건으로 한다. LG에너지솔루션·삼성SDI·SK이노베이션은 미국 합작 공장 가동으로
  수혜를 받지만, 양극재·음극재의 중국산 비중이 발목을 잡을 수 있다. FEOC
  가이드라인 강화 시 한국 셀 업체들도 간접 타격. 정권 교체 또는 법안 수정 발의
  뉴스는 큰 변동성 유발.
historical_examples:
  - "2024-12-01: FEOC 가이드라인 완화 코멘트 → LG에너지솔루션 +3.5%, 삼성SDI +2.8%"
  - "2025-02-15: IRA 폐지 발의 보도 → LG에너지솔루션 -8.2%, 삼성SDI -6.5%"
