id: lithium_price_001
topic: "리튬·니켈 가격 → 양극재·전구체 마진 사이클"
markets: [Global, KR]
sectors: [battery]
related_tickers: ["LIT", "247540", "066970", "005070", "278280"]
trigger_conditions:
  - "탄산리튬 현물가 주간 ±5% 변동"
  - "니켈(LME) ±5% 변동"
  - "Global X Lithium ETF(LIT) ±3% 동향"
positive_signal: "관심"
risk_warning: "원재료 가격 상승은 양극재 매출 증가지만 마진은 시차로 압박. 단기 양면성"
body: |
  양극재 업체(에코프로비엠, 엘앤에프, 코스모신소재)는 매출의 70% 이상이
  메탈가에 연동되는 P-Q 구조. 리튬·니켈 가격 상승은 매출 증가로 이어지지만
  계약 시점 대비 메탈가 변동에 따라 마진은 시차를 두고 영향을 받는다. 천보는
  전해질 첨가제 특화로 메탈 가격 직접 노출은 적지만, 전체 배터리 산업 사이클에
  연동된다. LIT ETF는 리튬·코발트·니켈 채굴주를 함께 묶어 글로벌 배터리 사이클의
  대용 지표 역할.
historical_examples:
  - "2024-12: 탄산리튬 현물가 +25% (3주) → 에코프로비엠 +12%, 엘앤에프 +9%"
  - "2025-03: 니켈 -15% → 양극재 종목 평균 -6%"
