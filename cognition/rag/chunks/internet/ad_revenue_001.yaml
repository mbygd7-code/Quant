body: |
  Google·Meta의 분기 광고 매출은 글로벌 디지털 광고 사이클의 대표 지표. 호조는
  NAVER 검색 광고, 카카오 톡채널·디스플레이 광고 매출 기대로 이어져 두 종목
  강세가 따른다. 단, 한국 광고 시장은 내수 중심이라 글로벌 사이클과 100% 동조하진
  않는다. 또한 양사가 AI(Gemini, Llama) 투자 코멘트를 강화하면 그 자체로 NAVER
  HyperClova·카카오 KoGPT 가치 재평가 가능.
historical_examples:
  - "2024-10-29: GOOGL Q3 광고 +12% YoY → NAVER +3.8%, 카카오 +2.5%"
  - "2025-04-24: META 광고 매출 미스 → NAVER -1.5%, 카카오 -2.1%"
