id: game_release_001
topic: "주요 신작 출시·흥행 — 게임주 모멘텀"
markets: [KR, Global]
sectors: [internet]
related_tickers: ["259960", "036570", "263750"]
trigger_conditions:
  - "신작 글로벌 출시일 D-7 이내"
  - "PC방 점유율(DAU) 상위 진입"
  - "Steam·구글플레이 매출 순위 상위 진입"
  - "동시접속자(CCU) 또는 매출 기록 보도"
positive_signal: "관심"
risk_warning: "흥행 결과는 binary. 미진 시 -10~20% 갭다운 가능. 출시 직후 1~2주 변동성 매우 큼"
body: |
  게임주는 신작 출시 모멘텀이 핵심이다. 크래프톤(배그 IP), 엔씨소프트(리니지·LLL),
  펄어비스(붉은사막)는 각자 주력 IP의 신작 출시 일정에 주가가 강하게 반응한다.
  출시 1주 차 매출·CCU·앱스토어 순위가 시장 컨센서스를 상회하면 +10~20% 강세,
  미진하면 -10% 이상 조정. 출시 직전 1주는 기대감 선반영으로 변동성 확대.
historical_examples:
  - "2024-07-08: 배그 모바일 인도 재론칭 → 크래프톤 +8.5%"
  - "2025-03-20: 펄어비스 붉은사막 출시 지연 → 펄어비스 -12%"
