id: idc_demand_001
topic: "IDC capacity 부족 → 케이아이엔엑스 임대료·가동률 상승"
markets: [KR]
sectors: [internet]
related_tickers: ["093320"]
trigger_conditions:
  - "글로벌 빅테크 한국 데이터센터 신규 임대 보도"
  - "케이아이엔엑스 분기 가동률 90% 이상 유지"
  - "수도권 IDC 용량 부족 관련 산업 보고서"
positive_signal: "관심"
risk_warning: "전력·부지 규제 강화 시 IDC 신규 증설 어려움 → 가격 상승 요인이지만 성장 정체 동시 발생"
body: |
  AI 학습·추론용 GPU 서버 수요로 글로벌 IDC capacity는 만성 부족. 한국 수도권은
  전력·부지 제약으로 신규 IDC 증설이 어려워 기존 사업자(케이아이엔엑스)의 임대료
  협상력이 강화되는 구조. 분기 가동률이 90% 이상 유지되면 임대료 인상 → 매출
  성장 + 마진 개선 모멘텀. MSFT·구글의 한국 데이터센터 임대 보도가 직접 호재.
historical_examples:
  - "2024-08-30: MSFT 한국 IDC 임대 보도 → 케이아이엔엑스 +6.5%"
  - "2025-01-15: 산업부 IDC 전력 가이드라인 강화 → 케이아이엔엑스 +3.2% (공급 제한 = 가격 상승)"
