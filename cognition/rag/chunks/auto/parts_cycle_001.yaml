  - "주요 협력사 분기 실적 공시"
  - "美·EU 자동차 판매 데이터"
positive_signal: "관심"
risk_warning: "부품주는 OEM 사이클에 후행. OEM 약세 시 부품주는 더 큰 폭으로 하락하는 경향"
body: |
  HL만도(브레이크/조향), 한온시스템(공조), 현대위아(파워트레인), 에스엘(램프)
  등은 현대차·기아 생산대수에 매출이 직접 연동된다. OEM 생산 호조 + 신차 출시
  + 환율 우호 3박자가 갖춰지면 부품주 멀티플 확대. 반대로 OEM 감산 또는 환율
  약세 시 부품주가 더 큰 폭으로 조정되는 경향. MGA(Magna)·APTV(Aptiv) 같은
  글로벌 부품사 동향도 동행 지표.
historical_examples:
  - "2024-12-01: 현대차 11월 글로벌 판매 +5% → HL만도 +4.2%, 한온시스템 +3.7%"
  - "2025-03-15: MGA 가이던스 미스 → HL만도 -3.5%, 현대모비스 -2.1%"
