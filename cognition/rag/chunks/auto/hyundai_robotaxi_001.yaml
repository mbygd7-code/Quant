id: hyundai_robotaxi_001
topic: "현대차그룹 자율주행·로보택시·소프트웨어 동향"
markets: [Global, KR]
sectors: [auto]
related_tickers: ["005380", "012330"]
trigger_conditions:
  - "현대차 자율주행 합작사(모셔널 등) 사업 진척 보도"
  - "Waymo/Cruise 등 경쟁사 로보택시 상용화 뉴스"
  - "차량용 SW(Pleos, ccOS) 업데이트 발표"
positive_signal: "관심"
risk_warning: "자율주행은 현대차 매출의 직접 비중이 작음. 멀티플 재평가 트리거로 작용하기까지 시간 소요"
body: |
  현대차그룹은 모셔널(Aptiv 합작) 통해 로보택시 사업, Pleos 통해 차량용 OS 자체
  플랫폼을 추진 중이다. 글로벌 자율주행·SDV(소프트웨어 정의 차량) 흐름에서 뒤처질
  경우 멀티플 디스카운트 위험이 있다. 반대로 진척 뉴스가 나오면 자동차 → 모빌리티
  플랫폼 기업으로 재평가받는 모멘텀이 가능. 현대모비스는 자율주행 부품 (LiDAR,
  ADAS) 공급으로 간접 수혜.
historical_examples:
  - "2024-10-25: Waymo 5번째 도시 진출 → 현대차 -1.3% (경쟁 우려)"
  - "2025-01-12: 현대차 CES Pleos 공개 → 현대차 +2.5%, 현대모비스 +3.1%"
