id: usdkrw_export_001
topic: "원/달러 환율 강세 → 현대차·기아 수출 마진 개선"
markets: [FX, KR]
sectors: [auto]
related_tickers: ["USDKRW", "005380", "000270", "012330"]
trigger_conditions:
  - "USD/KRW +1% 이상 (원화 약세)"
  - "美 10년물 금리 +20bp 이상 (달러 강세 동조)"
positive_signal: "강한 관심"
risk_warning: "환율 강세 지속 시 외국인 자금 이탈 가능. 코스피 전체 약세와 동시에 가는 경우 주의"
body: |
  현대차·기아의 매출 60% 이상이 수출이며 결제 통화는 주로 달러다. 따라서 원/달러
  환율이 1% 절하될 때마다 영업이익은 약 800억 원 증가하는 구조. USD/KRW가 단기간
  상승하면 수출 마진 기대로 자동차주 강세가 따른다. 현대모비스도 부품 수출 비중이
  커서 함께 움직인다. 다만 환율 강세가 美 금리 인상·신흥국 자금 이탈과 동행하면
  코스피 전체 약세에 묻힐 수 있다.
historical_examples:
  - "2024-04-16: USD/KRW 1390 돌파 → 현대차 +3.8%, 기아 +4.2%"
  - "2025-04-10: USD/KRW 1480 → 현대차 +5.5%, 기아 +6.1%, 현대모비스 +3.8%"
