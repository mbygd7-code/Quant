risk_warning: "美 OEM과 한국 OEM은 경쟁 + 동조 양면성. 점유율 변동 함께 확인 필요"
body: |
  미국 자동차 판매(SAAR)는 글로벌 자동차 수요의 가장 큰 단일 지표다. 1700만대
  이상이면 호조, 1500만대 이하면 둔화 신호. 현대차·기아의 미국 점유율이 약 10%로
  이 시장 호조는 직접 수혜. GM/Ford 가이던스 호조는 부품 협력사(HL만도, 한온시스템)
  에도 동반 호재. 단, 한국 OEM과 美 OEM 점유율이 zero-sum이라 GM/Ford 호조가
  현대차·기아 약세를 동반할 수도 있어 점유율 동향 함께 봐야 한다.
historical_examples:
  - "2024-09-04: 美 SAAR 1620만대 발표 → 현대차 +2.1%, HL만도 +3.5%"
  - "2025-04-08: GM 가이던스 미스 → 현대차 -1.8%, 한온시스템 -2.7%"
