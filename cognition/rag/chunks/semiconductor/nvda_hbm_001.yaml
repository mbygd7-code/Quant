id: nvda_hbm_001
topic: "Nvidia 데이터센터 매출 호조 → 한국 HBM 공급망 수혜"
markets: [US, KR]
sectors: [semiconductor]
related_tickers: ["NVDA", "000660", "042700", "005930", "058470", "039030"]
trigger_conditions:
  - "Nvidia 종가 +2% 이상 상승"
  - "Nvidia 분기 매출 가이던스 컨센서스 5% 이상 상회"
  - "필라델피아 반도체 지수(SOX) 동반 상승"
  - "AI 서버·HBM 관련 외신 보도 2건 이상"
positive_signal: "강한 관심"
risk_warning: "장 초반 갭상승 시 추격매수 위험. 외국인이 이미 5일 연속 순매수했다면 단기 차익실현 가능성"
body: |
  Nvidia의 데이터센터 매출은 AI 가속기(H100, H200, B100) 수요로 직결된다.
  이 칩에는 HBM3/HBM3E 메모리가 필수로 탑재되며, SK하이닉스가 글로벌 점유율 50%
  이상으로 사실상 독점적 공급자다. 삼성전자도 HBM 공급 확대 중이며, 한미반도체는
  HBM 후공정 본더(Bonder) 장비를 SK하이닉스에 납품한다. 따라서 Nvidia의 가이던스
  상회는 SK하이닉스 → 삼성전자 → 한미반도체 → 리노공업(테스트 소켓) → 이오테크닉스
  (레이저 어닐링 장비) 순으로 영향이 전파된다.
historical_examples:
  - "2024-08-29: Nvidia 분기 매출 가이던스 상회 → 다음날 SK하이닉스 +4.8%, 한미반도체 +6.2%"
  - "2024-11-21: Nvidia 가이던스 미스에도 데이터센터 매출 호조 → SK하이닉스 +2.1%"
  - "2025-02-26: Nvidia Blackwell 대량 출하 발표 → SK하이닉스 +5.3%, 한미반도체 +7.1%"
