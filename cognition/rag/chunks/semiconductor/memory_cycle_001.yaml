id: memory_cycle_001
topic: "DRAM/NAND 현물가격 사이클 → 메모리 종목 모멘텀"
markets: [KR]
sectors: [semiconductor]
related_tickers: ["000660", "005930", "067310"]
trigger_conditions:
  - "DRAMeXchange 주간 현물가 ±3% 변동"
  - "TrendForce 분기 가격 전망 발표"
  - "재고 수준 관련 IT 채널 코멘트"
positive_signal: "관심"
risk_warning: "현물가는 전체 매출의 10~20%만 차지(나머지는 계약가). 단기 시그널로만 활용"
body: |
  DRAM·NAND 현물가격은 메모리 사이클의 가장 빠른 선행 지표다. 가격 상승 전환은
  공급자 우위 시장 진입 신호로, SK하이닉스·삼성전자 주가 모멘텀에 핵심적이다.
  특히 4~6주 연속 현물가 상승은 본격적 사이클 회복을 시사하며, 외국인 매수
  유입과 동반되는 경향이 있다. 반대로 4주 연속 하락은 사이클 후반부 진입 신호로
  단기 차익실현 압력을 받는다. 하나마이크론은 OSAT 사업 특성상 사이클 영향이 더
  민감하다.
historical_examples:
  - "2024-08~10: DRAM 현물가 8주 연속 상승 → SK하이닉스 +18%, 삼성전자 +9%"
  - "2025-02: 현물가 -12% → SK하이닉스 -7%, 삼성전자 -3%"
