topic: "원화 약세 → CMO·바이오시밀러 수출 마진"
markets: [FX, KR]
sectors: [bio]
related_tickers: ["USDKRW", "207940", "068270", "128940", "006280"]
trigger_conditions:
  - "USD/KRW +1% 이상 (원화 약세)"
  - "삼성바이오로직스 CMO 수주 공시"
positive_signal: "관심"
risk_warning: "환율 강세는 바이오에 자동차만큼 강한 영향은 아님. 부수적 요인"
body: |
  삼성바이오로직스는 매출 대부분이 글로벌 빅파마와의 CMO 계약으로 달러 결제다.
  원/달러 환율 절하는 영업이익에 직접 양(+) 영향. 셀트리온도 바이오시밀러 수출
  비중이 커서 환율 수혜. 한미약품·녹십자는 내수 비중이 더 커서 환율 영향이 상대적
  약함. 단, 환율 강세가 신흥국 자금 이탈과 동행하면 바이오 섹터 전반 약세에
  묻힐 수 있으므로 외국인 매매 동시 확인 필요.
historical_examples:
  - "2024-04-15: USD/KRW 1390 돌파 → 삼성바이오로직스 +2.8%, 셀트리온 +1.9%"
  - "2025-04-09: USD/KRW 1480 → 삼성바이오로직스 +3.5%, 셀트리온 +2.5%"
