body: |
  알테오젠은 NVO·LLY와 GLP-1 적응증 확대 관련 라이선스 협력 중이다. NVO/LLY
  매출 호조는 GLP-1 시장 확대 시그널로 알테오젠에 직접 모멘텀. 특히 심혈관 보호
  효과, 알츠하이머 적응증 등 새로운 임상 데이터가 긍정적이면 GLP-1 시장 규모
  자체가 재평가되어 큰 폭 강세. 반대로 공급 부족 해소·경쟁 심화는 단기 매출 우려.
historical_examples:
  - "2024-08-08: LLY 분기 매출 +30% YoY → 알테오젠 +8.5%"
  - "2025-03-05: NVO 알츠하이머 적응증 임상 실패 → 알테오젠 -6.2%"
