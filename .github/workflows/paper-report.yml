name: Paper Trading Weekly Report

# Soros 모의투자 주간 보고 — 매주 토요일 09:00 KST (금요일 종가까지의
# 한 주를 정리해 텔레그램으로 발송). 가상 자금 시뮬레이션의 거래내역과
# 손익을 통해 신호의 실전 활용 가능성을 주 단위로 점검한다.

on:
  schedule:
    - cron: "0 0 * * 6"   # Sat 00:00 UTC = Sat 09:00 KST
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e .
      # Evolve the trading policy FIRST so the report reflects the
      # freshly-learned grade trust / stop-loss / sector skill. The
      # learner replays the immutable trade ledger and appends a new
      # bounded, gated policy version (executor/policy_learner.py).
      - name: Evolve trading policy
        run: |
          set -o pipefail
          python -m executor.policy_learner 2>&1 | tee policy-learn.log
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID:    ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          EXECUTION_MODE:            paper
        continue-on-error: true
      - name: Send weekly report
        run: |
          set -o pipefail
          python -m executor.paper_trader_bot --weekly-report 2>&1 | tee paper-report.log
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID:    ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          EXECUTION_MODE:            paper
