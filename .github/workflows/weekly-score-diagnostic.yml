name: Weekly Score Diagnostic

# Captures the score↔price predictive-power snapshot every Sunday
# evening (KST) so we can watch how voter signal strength evolves
# as the cumulative ai_scores history grows.
#
# Results land in the model_diagnostics table (migration 28). The
# admin dashboard reads from there.

on:
  # Sunday 18:00 KST = 09:00 UTC Sunday. After the morning's pipeline
  # has already written that week's last ai_scores rows.
  schedule:
    - cron: "0 9 * * 0"
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback window in days (default 90)"
        required: false
        default: "90"

concurrency:
  group: weekly-score-diagnostic
  cancel-in-progress: false

env:
  # Opt into Node.js 24 ahead of GitHub forcing it 2026-06-16.
  # See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run diagnostic + persist to model_diagnostics
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          DAYS="${{ github.event.inputs.days }}"
          DAYS="${DAYS:-90}"
          python -m signals.diagnose_score_price --days "$DAYS" --persist
