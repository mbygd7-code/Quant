name: Agents Cycle (M4)

# Cost-optimised 3x cron — universe stratified by stocks.tier:
#
#   07:00 KST  →  22:00 UTC  →  --tier S,A,B  (full 50, +change-detect)
#   12:00 KST  →  03:00 UTC  →  --tier S      (core 10, +change-detect)
#   16:00 KST  →  07:00 UTC  →  --tier S      (core 10, +change-detect)
#
# Estimated daily LLM call count:
#   07 KST:  50 × 7 = 350 raw, × 0.7 (change skip) ≈ 245
#   12 KST:  10 × 7 = 70  raw, × 0.7              ≈ 50
#   16 KST:  10 × 7 = 70  raw, × 0.7              ≈ 50
#   ──────────────────────────────────────────────────
#   total ≈ 345 calls/day  (was ~1050 → -67%)
#
# Manual `workflow_dispatch` accepts a tier override + change-detect
# flag for ad-hoc runs.
#
# Per-ticker failure is isolated by the orchestrator (M2-T5).

on:
  # ▶ Cron re-enabled 2026-05-10 after backtest validation +
  # tier-stratification + change-detection (PR #8). Daily LLM call
  # budget ~345 (-67% vs naive). Anthropic Console daily cap is the
  # safety net against runaway loops.
  schedule:
    - cron: '0 22 * * *'   # 07:00 KST  →  --tier S,A,B
    - cron: '0 3  * * *'   # 12:00 KST  →  --tier S
    - cron: '0 7  * * *'   # 16:00 KST  →  --tier S
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Comma-separated tickers (empty = use --tier filter)'
        required: false
        default: ''
      tier:
        description: 'Tier filter (S,A,B). Empty = all tiers.'
        required: false
        default: 'S,A,B'
      favorites_only:
        description: 'Restrict Stage-2 LLM analysis to LNB favorites union (overrides tier)'
        type: boolean
        required: false
        default: true
      require_change:
        description: 'Skip quiet tickers (price/volume/macro all flat)'
        type: boolean
        required: false
        default: true
      dry_run:
        description: 'Analyze without writing to the DB'
        type: boolean
        required: false
        default: false

env:
  # Opt into Node.js 24 ahead of GitHub forcing it 2026-06-16.
  # See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  cycle:
    name: Run M4 cycle
    runs-on: ubuntu-latest
    # 60 (not 30) so a macro-shock day — when change-detect wakes ALL 50
    # tickers (50 × ~8 LLM calls ≈ 40min+) — completes instead of getting
    # killed mid-run. That's exactly the day signals matter most. Normal
    # incremental cron (~10-15 changed tickers) finishes in 10-20min and
    # is unaffected; the higher ceiling only costs GH minutes on a genuine
    # hang, which the per-ticker isolation + always-uploaded log catch.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Determine tier from cron schedule
        id: tier-from-schedule
        # Cron-fired runs use the schedule expression to pick the tier.
        # Manual dispatch uses inputs.tier directly.
        run: |
          if [ -n "${{ github.event.schedule }}" ]; then
            # Cron-fired runs now default to LNB favorites only — the
            # cycle worker falls back to the tier filter if no user has
            # favorited anything yet. tier= still serves the safety-net
            # fallback inside run_cycle().
            case "${{ github.event.schedule }}" in
              "0 22 * * *") TIER="S,A,B" ;;   # 07 KST  full universe fallback
              "0 3 * * *")  TIER="S" ;;        # 12 KST  core fallback
              "0 7 * * *")  TIER="S" ;;        # 16 KST  core fallback
              *)            TIER="S,A,B" ;;
            esac
            echo "tier=$TIER" >> "$GITHUB_OUTPUT"
            echo "favorites_only=true" >> "$GITHUB_OUTPUT"
            echo "require_change=true" >> "$GITHUB_OUTPUT"
          else
            echo "tier=${{ inputs.tier }}" >> "$GITHUB_OUTPUT"
            echo "favorites_only=${{ inputs.favorites_only }}" >> "$GITHUB_OUTPUT"
            echo "require_change=${{ inputs.require_change }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run cycle
        id: cycle
        run: |
          set -o pipefail
          ARGS=""
          if [ -n "${{ inputs.tickers }}" ]; then
            ARGS="$ARGS --tickers ${{ inputs.tickers }}"
          fi
          TIER="${{ steps.tier-from-schedule.outputs.tier }}"
          if [ -n "$TIER" ]; then
            ARGS="$ARGS --tier $TIER"
          fi
          if [ "${{ steps.tier-from-schedule.outputs.favorites_only }}" = "true" ]; then
            ARGS="$ARGS --favorites-only"
          fi
          if [ "${{ steps.tier-from-schedule.outputs.require_change }}" = "true" ]; then
            ARGS="$ARGS --require-change"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "[workflow] running: python -m agents.cycle.run_m4_cycle$ARGS"
          python -m agents.cycle.run_m4_cycle $ARGS 2>&1 | tee cycle-stdout.log
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload cycle report (always)
        # Always upload — per-ticker errors are isolated but make the run
        # exit non-zero; we want the log even on partial runs so synthesis
        # regressions are inspectable without re-running the cycle.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cycle-report
          path: cycle-stdout.log
          retention-days: 14
