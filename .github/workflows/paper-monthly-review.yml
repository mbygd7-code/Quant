name: Paper Trading Monthly Review

# 월간 알파 평가 — 매월 1일 09:30 KST. 지난 달 포트폴리오 수익률을
# KOSPI와 비교해 텔레그램으로 발송하고, 알파가 음수면 전략 재검토
# 경보를 울린다 (월 5% 목표 체계의 레버 ⑤ — 안 되는 전략이 관성으로
# 굴러가는 것을 차단).

on:
  schedule:
    - cron: "30 0 1 * *"   # 1st of month 00:30 UTC = 09:30 KST
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e .
      - name: Send monthly review
        run: |
          set -o pipefail
          python -m executor.paper_trader_bot --monthly-review 2>&1 | tee monthly-review.log
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID:    ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          EXECUTION_MODE:            paper
