name: Daily Pipeline

on:
  # ▶ Cron re-enabled 2026-05-10 alongside agents-cycle.yml after
  # backtest validation + cost-optimisation. Single daily run at
  # 06:00 KST (21:00 UTC previous day). KR weekdays = UTC Sun-Thu.
  schedule:
    - cron: "0 21 * * 0-4"
  workflow_dispatch:
    inputs:
      date:
        description: "Run for specific KST date (YYYY-MM-DD). Empty = today."
        required: false
        default: ""

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

env:
  # Opt into Node.js 24 ahead of GitHub forcing it 2026-06-16.
  # See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-pipeline:
    name: collectors → refinery → cognition → signal → notify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Collect KR news (per-ticker NAVER feed)
        id: kr_news
        run: |
          set -o pipefail
          python -m collectors.kr_news --tickers "$(python -c '
          from db.supabase_client import get_admin_client
          sb = get_admin_client()
          rows = sb.table("stocks").select("ticker").eq("is_watchlist", True).execute().data or []
          print(",".join(sorted([r["ticker"] for r in rows])))
          ')" 2>&1 | tee kr-news.log
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        continue-on-error: true

      # 수출입 동향 (9th factor). Monthly data, but the call is 4 HS
      # codes × 1 request — cheap enough to refresh daily so the 15th-
      # of-month finalization lands the same morning. Skips cleanly
      # (exit 0 + log) when DATA_GO_KR_API_KEY isn't configured yet.
      - name: Collect KR trade stats (관세청 수출입실적)
        id: kr_trade
        run: |
          set -o pipefail
          python -m collectors.kr_trade 2>&1 | tee kr-trade.log
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATA_GO_KR_API_KEY:        ${{ secrets.DATA_GO_KR_API_KEY }}
        continue-on-error: true

      # continue-on-error keeps a flaky collector from blocking the main
      # pipeline, but it also paints the run green — that hid the KR-news
      # outage for a week (URL-too-long) and the NAVER 404 before it.
      # This step makes silent failures LOUD: any failed collector outcome
      # → Telegram alert (run still proceeds).
      - name: Alert on silently-failed collectors
        if: always() && (steps.kr_news.outcome == 'failure' || steps.kr_trade.outcome == 'failure')
        env:
          BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          NEWS_OUTCOME:  ${{ steps.kr_news.outcome }}
          TRADE_OUTCOME: ${{ steps.kr_trade.outcome }}
          RUN_URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          FAILED=""
          [ "$NEWS_OUTCOME" = "failure" ]  && FAILED="$FAILED KR뉴스"
          [ "$TRADE_OUTCOME" = "failure" ] && FAILED="$FAILED 수출입동향"
          echo "::warning::collector step(s) failed:$FAILED (run continues)"
          tail -n 15 kr-news.log kr-trade.log 2>/dev/null || true
          if [ -z "$BOT_TOKEN" ] || [ -z "$ADMIN_CHAT_ID" ]; then
            echo "telegram secrets absent — alert skipped"; exit 0
          fi
          MSG=$(printf '⚠️ 일일 파이프라인: 수집기 실패 —%s\n파이프라인 본체는 계속 실행됨. 데이터 공백 가능.\n%s' "$FAILED" "$RUN_URL")
          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${ADMIN_CHAT_ID}" \
            --data-urlencode "text=${MSG}" || echo "telegram notify failed (non-fatal)"

      - name: Run pipeline
        run: |
          set -o pipefail
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            python -m orchestrator.pipeline --mode=once --date=today 2>&1 | tee pipeline-stdout.log
          else
            python -m orchestrator.pipeline --mode=once --date="$DATE" 2>&1 | tee pipeline-stdout.log
          fi
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET_RAW:       raw-api-backups
          SUPABASE_BUCKET_BACKTEST:  backtest-reports
          SUPABASE_BUCKET_REPORTS:   daily-reports
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:            ${{ secrets.OPENAI_API_KEY }}
          FINNHUB_API_KEY:           ${{ secrets.FINNHUB_API_KEY }}
          DART_API_KEY:              ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID:    ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          EXECUTION_MODE:            report_only
          TIMEZONE:                  Asia/Seoul

      - name: Show notify section (always)
        if: always()
        run: |
          echo "================ NOTIFY SECTION ================"
          grep -E "Notify|notifier|telegram" pipeline-stdout.log | tail -n 50 || echo "(no notify lines found)"
          echo "================ LAST 30 LINES ================="
          tail -n 30 pipeline-stdout.log

      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-stdout
          path: pipeline-stdout.log
          retention-days: 7

      - name: Notify on failure
        if: failure() && env.ADMIN_CHAT_ID != ''
        env:
          BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID:  ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          RUN_URL:        ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${ADMIN_CHAT_ID}" \
            --data-urlencode "text=🚨 Daily Pipeline 실패 — ${RUN_URL}"
