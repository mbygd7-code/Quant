name: On-Demand Backtest

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Backtest job ID (UUID, issued by apps/api)"
        required: true
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true
      strategy:
        description: "Strategy key (default: score_above_065)"
        required: true
        default: "score_above_065"
      weight_config_id:
        description: "weight_configs.id (UUID). Empty = active version."
        required: false
        default: ""

jobs:
  run-backtest:
    name: signal/backtest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e .

      - name: Mark job running
        # signal.backtest_status will be implemented in Prompt 09.
        continue-on-error: true
        run: |
          python -m signal.backtest_status \
            --job-id="${{ github.event.inputs.job_id }}" \
            --status=running \
            --run-url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run backtest
        # signal.backtest will be implemented in Prompt 09.
        continue-on-error: true
        run: |
          python -m signal.backtest \
            --job-id="${{ github.event.inputs.job_id }}" \
            --start="${{ github.event.inputs.start_date }}" \
            --end="${{ github.event.inputs.end_date }}" \
            --strategy="${{ github.event.inputs.strategy }}" \
            --weight-config-id="${{ github.event.inputs.weight_config_id }}"
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Mark job complete
        if: always()
        continue-on-error: true
        run: |
          python -m signal.backtest_status \
            --job-id="${{ github.event.inputs.job_id }}" \
            --status="${{ job.status }}"
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
