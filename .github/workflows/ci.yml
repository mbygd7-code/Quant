name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint-test:
    name: Python (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: |
          set -o pipefail
          pytest -v --tb=long --color=no --junitxml=test-results.xml 2>&1 | tee pytest-stdout.log
        env:
          # Test instance — separate Supabase project (optional, can be the same).
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL_TEST || secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_TEST || secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # M1-T9: assert migrations 18-22 (8-agent core schema + admin views)
      # are present on the linked Supabase. Skipped on PRs from forks
      # because they don't have access to repo secrets.
      - name: Agent schema check
        if: ${{ secrets.SUPABASE_URL != '' || secrets.SUPABASE_URL_TEST != '' }}
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL_TEST || secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_TEST || secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m agents.db.migrations_check

      - name: Show last 100 lines on failure
        if: failure()
        run: |
          echo "================ LAST 100 LINES OF PYTEST OUTPUT ================"
          tail -n 100 pytest-stdout.log
          echo "================ FAILED TEST NAMES ============================="
          grep -E "^FAILED|^ERROR" pytest-stdout.log || true

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            test-results.xml
            pytest-stdout.log
          retention-days: 7

  web-lint-typecheck:
    name: Web (lint + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      # apps/web/ is empty until Prompt 13 — skip gracefully.
      - name: Skip if package.json absent
        id: check
        run: |
          if [ ! -f package.json ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/web has no package.json yet — skipping web checks (will be added in Prompt 13)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip == 'false'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - if: steps.check.outputs.skip == 'false'
        run: npm ci
      - if: steps.check.outputs.skip == 'false'
        run: npm run lint
      - if: steps.check.outputs.skip == 'false'
        run: npm run typecheck
