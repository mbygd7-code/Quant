name: Supabase Migration

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/migrate.yml"
  workflow_dispatch:

env:
  # Opt into Node.js 24 ahead of GitHub forcing it 2026-06-16.
  # See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  migrate:
    name: supabase db push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Project ref is also exposed via NEXT_PUBLIC_SUPABASE_URL, so it's
      # not a secret. Hardcoding here eliminates "wrong secret value"
      # as a failure mode for CI migrations.
      - name: Link project
        run: supabase link --project-ref yanzpasrpzppcmlrxyjp
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}
