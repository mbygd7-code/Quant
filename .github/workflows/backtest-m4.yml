name: M4 Mini-Backtest

# Manual trigger only — uses real Anthropic + Supabase credentials.
# The replay is dry-run (no DB writes) but every voting character
# makes real LLM calls, so the cost cap below is critical.

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Comma-separated 6-digit tickers (e.g. 005930,000660,035420)'
        required: true
        default: '005930,000660,035420,005380,207940'
      dates:
        description: 'Comma-separated cycle dates YYYY-MM-DD (historical)'
        required: true
        default: ''
      cost_budget:
        description: 'Max USD spend before halting'
        required: true
        default: '15.0'
      horizons:
        description: 'Forward-return horizons in calendar days'
        required: true
        default: '5,10,20'

env:
  # Opt into Node.js 24 ahead of GitHub forcing it 2026-06-16.
  # See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backtest:
    name: Replay M4 + evaluate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Replay
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m agents.backtest.replay_m4 \
            --tickers "${{ inputs.tickers }}" \
            --dates "${{ inputs.dates }}" \
            --cost-budget "${{ inputs.cost_budget }}" \
            --out backtest_results.csv \
            2>&1 | tee replay-stdout.log

      - name: Evaluate
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m agents.backtest.evaluate \
            --csv backtest_results.csv \
            --horizons "${{ inputs.horizons }}" \
            2>&1 | tee evaluate-stdout.log

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m4-backtest
          path: |
            backtest_results.csv
            replay-stdout.log
            evaluate-stdout.log
          retention-days: 30
